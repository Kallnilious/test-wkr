[build]
builder = "DOCKERFILE"
dockerfilePath = "./Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[variables]
PORT = "3000"
NODE_ENV = "production"
DATABASE_URL = ""
JWT_SECRET = ""
OPENAI_API_KEY = ""
# Optional: Set VITE_API_BASE_URL to empty string for same-origin API calls
VITE_API_BASE_URL = ""